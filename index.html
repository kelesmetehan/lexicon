function initDatabase() {
  try {
    let existingWords = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
    const synchronizedPool = NATIVE_USER_DATA.map((w, idx) => {
      const foundMatch = existingWords.find(ex => ex.en.toLowerCase() === w.en.toLowerCase() && ex.source === 'user');
      if (foundMatch) { foundMatch.tr = w.tr; foundMatch.example = w.example; return foundMatch; }
      else {
        return {
          id: "usr_" + Date.now() + "_" + idx,
          en: w.en, tr: w.tr, example: w.example || "", source: "user",
          repetitions: w.repetitions || 0, interval: w.interval || 0, reviewCount: w.reviewCount || 0,
          wrongCount: 0, isActiveMistake: false
        };
      }
    });
    localStorage.setItem(DB_KEY, JSON.stringify(synchronizedPool));
  } catch(e) { console.error(e); }
}

function loadUserWords() { return JSON.parse(localStorage.getItem(DB_KEY) || '[]').filter(w => w.source === 'user'); }
function saveWordsToStorage(updatedWords) {
  const all = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
  const merged = all.map(w => updatedWords.find(u => u.id === w.id) || w);
  localStorage.setItem(DB_KEY, JSON.stringify(merged));
}
function todayStr() { return new Date().toISOString().split('T')[0]; }

function startWCTournament() {
  wc.active = true; wc.stage = 'group'; wc.matchIndex = 0; wc.usedWords = [];
  wc.playerTeam = WC_TEAMS[Math.floor(Math.random() * WC_TEAMS.length)];
  let groupAll = WC_TEAMS.filter(t => t.group === wc.playerTeam.group);
  wc.groupTeams = [wc.playerTeam, ...groupAll.filter(t => t.name !== wc.playerTeam.name)];
  wc.standings = {}; wc.groupTeams.forEach(t => wc.standings[t.name] = { team: t, P: 0, W: 0, D: 0, L: 0, GD: 0 });
  wc.schedule = [{ playerMatch: 1, otherMatch: [2, 3] }, { playerMatch: 2, otherMatch: [1, 3] }, { playerMatch: 3, otherMatch: [1, 2] }];
  renderWCIntro();
}

function renderWCIntro() {
  const area = document.getElementById('flashcard-area');
  area.innerHTML = `
    <div class="quiz-start-card">
      <div class="quiz-start-title">WC 2026 <em>Başlıyor</em></div>
      <div class="wc-score-box" style="justify-content:center;">
        <div class="wc-team">
          <div class="wc-flag">${wc.playerTeam.flag}</div>
          <div class="wc-team-name">${wc.playerTeam.name}</div>
        </div>
      </div>
      <button class="btn btn-wc" onclick="prepareNextWCMatch()">İlk Maça Çık ➔</button>
    </div>`;
}

function prepareNextWCMatch() {
  wc.inPenalties = false;
  wc.wordCount = wc.stage === 'group' ? STAGE_WORDS['group'] : STAGE_WORDS[wc.stage];
  wc.opponent = wc.stage === 'group' ? wc.groupTeams[wc.schedule[wc.matchIndex].playerMatch] : WC_TEAMS.filter(t => t.name !== wc.playerTeam.name)[Math.floor(Math.random() * 47)];
  
  const area = document.getElementById('flashcard-area');
  area.innerHTML = `
    <div class="quiz-start-card">
      <div class="wc-score-box">
        <div class="wc-team"><div class="wc-flag">${wc.playerTeam.flag}</div><div class="wc-team-name">${wc.playerTeam.name}</div></div>
        <div class="wc-score">VS</div>
        <div class="wc-team"><div class="wc-flag">${wc.opponent.flag}</div><div class="wc-team-name">${wc.opponent.name}</div></div>
      </div>
      <button class="btn btn-wc" onclick="startFlashcard(false, ${wc.wordCount})">Maça Başla ⚽</button>
    </div>`;
}

function startFlashcard(onlyMistakes, limitOverride) {
  let pool = loadUserWords();
  
  // Kullanılmamış kelimeleri al
  let poolFiltered = wc.active ? pool.filter(w => !wc.usedWords.includes(w.id)) : pool;
  if (wc.active && poolFiltered.length < (limitOverride || 10)) { wc.usedWords = []; poolFiltered = pool; }

  // WC modu için dinamik sıralama
  poolFiltered.forEach(w => {
    let score = Math.random() * 50;
    if (wc.active) {
      let stageDiff = wc.stage === 'group' ? 0.0 : wc.stage === 'ro32' ? 0.2 : wc.stage === 'ro16' ? 0.4 : wc.stage === 'qf' ? 0.6 : wc.stage === 'sf' ? 0.8 : 1.0;
      let easyScore = (w.reviewCount || 0) * 30 + ((w.reviewCount - (w.wrongCount || 0)) / (w.reviewCount || 1)) * 1000;
      let hardScore = (w.isActiveMistake ? 1000 : 0) + ((w.wrongCount || 0) / (w.reviewCount || 1)) * 800;
      score = (easyScore * (1 - stageDiff)) + (hardScore * stageDiff);
    }
    w.priority = score;
  });

  poolFiltered.sort((a,b) => b.priority - a.priority);
  fcQueue = poolFiltered.slice(0, limitOverride || 10);
  if (wc.active) fcQueue.forEach(c => wc.usedWords.push(c.id));
  
  fcIndex = 0; fcCorrect = 0; fcTotal = fcQueue.length;
  showNextFlashcard();
}

function showNextFlashcard() {
  if (fcIndex >= fcQueue.length) { wc.active ? showWCSummary() : showFlashcardSummary(); return; }
  const card = fcQueue[fcIndex];
  document.getElementById('flashcard-area').innerHTML = `
    <div class="flashcard-wrap" onclick="reveal()" id="fc-card">
      <div class="flashcard" id="fc-inner">
        <div class="quiz-word">${card.en}</div>
        <div class="flashcard-back" id="fc-back" style="display:none"><div class="flashcard-answer">${card.tr}</div></div>
      </div>
    </div>
    <div class="flashcard-actions" id="fc-actions"><button class="fc-btn fc-idk" onclick="rate(1)">✗ Bilmiyorum</button><button class="fc-btn fc-easy" onclick="rate(5)">✓ Bildim</button></div>
  `;
}

function reveal() { document.getElementById('fc-inner').classList.add('revealed'); document.getElementById('fc-back').style.display='block'; document.getElementById('fc-actions').classList.add('visible'); }
function rate(q) { if(q>=4) fcCorrect++; fcIndex++; showNextFlashcard(); }
function showWCSummary() { /* Önceki mantık aynı */ location.reload(); } // Basitlik için reset
function showFlashcardSummary() { renderPreStart(); }

initDatabase();
renderPreStart();
