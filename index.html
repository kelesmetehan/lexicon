// --- PROGRAM MANTIĞI (v1.0 Klasik) ---
let currentSession_wordList = [];
let currentIndex = 0;

function showTranslation() {
    document.getElementById('translation').style.display = 'block';
    document.getElementById('show-btn').style.display = 'none';
    document.getElementById('repeat-buttons').style.display = 'inline-block';
}

function updateStatistics() {
    let now = new Date();
    let wordsDueToday = master_wordList.filter(word => {
        return !word.p_nr || new Date(word.p_nr) <= now;
    }).length;

    let learningWords = master_wordList.filter(word => word.level > 0 && word.level < 5).length;
    let learnedWords = master_wordList.filter(word => word.level >= 5).length;

    document.getElementById('statistics').innerHTML = `
        Bugün Çalışılması Gereken: ${wordsDueToday} | 
        Öğrenilmekte: ${learningWords} | 
        Öğrenilmiş: ${learnedWords}
    `;
}

function processResponse(knewIt) {
    let word = currentSession_wordList[currentIndex];
    let now = new Date();

    if (knewIt) {
        word.repeats++;
        if (word.level < 5) { // v1.0 classic logic
            word.level++;
        }
    } else {
        word.level = 1; // v1.0 classic reset to level 1
    }

    // Klasik Leitner Sistemi Tekrar Günleri (v1.0'daki gibi)
    let daysToAdd = 1; // Default level 1
    if (word.level === 2) daysToAdd = 3;
    else if (word.level === 3) daysToAdd = 7;
    else if (word.level === 4) daysToAdd = 16;
    else if (word.level >= 5) daysToAdd = 35; // v1.0 classic 'learned' interval

    word.p_nr = new Date(now.getTime() + daysToAdd * 24 * 60 * 60 * 1000).toISOString();

    currentIndex++;
    if (currentIndex < currentSession_wordList.length) {
        showWord();
    } else {
        finishSession();
    }
}

function showWord() {
    const word = currentSession_wordList[currentIndex];
    // Arayüzde BENİM ekini temizle
    document.getElementById('word').innerText = word.en.replace('BENİM', '');
    document.getElementById('translation').innerText = word.tr;
    document.getElementById('translation').style.display = 'none';
    document.getElementById('show-btn').style.display = 'inline-block';
    document.getElementById('repeat-buttons').style.display = 'none';
}

function startSession() {
    let now = new Date();
    // v1.0 Classic session pool: Sadece zamanı gelenleri veya seviye 0'ları al
    currentSession_wordList = master_wordList.filter(word => {
        return !word.p_nr || new Date(word.p_nr) <= now;
    });

    // Basit bir karıştırma (v1.0'daki gibi)
    currentSession_wordList.sort(() => Math.random() - 0.5);

    if (currentSession_wordList.length > 0) {
        currentIndex = 0;
        showWord();
        updateStatistics();
    } else {
        document.getElementById('word').innerText = "Bugün çalışılacak kelime yok!";
        updateStatistics();
    }
}

function finishSession() {
    document.getElementById('container').classList.remove('visible');
    document.getElementById('finish-container').style.display = 'block';
    
    // Verileri v1.0 classic JSON formatında dışa aktar
    document.getElementById('export-data').value = "let master_wordList = " + JSON.stringify(master_wordList, null, 2) + ";";
}

// --- BAŞLANGIÇ ---
window.onload = startSession;

</script>
</body>
</html>
