<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEXICON — WC 2026 Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0c10; --bg2: #0f1218; --bg3: #161b24; --bg4: #1d2430; --gold: #c9a84c; --gold2: #e8c870; --gold-dim: rgba(201,168,76,0.15); --text: #e8e4da; --text2: #9a9589; --text3: #5a5650; --green: #4caf7d; --green-dim: rgba(76,175,125,0.15); --red: #e05c5c; --red-dim: rgba(224,92,92,0.12); --border: rgba(201,168,76,0.12); --shadow: 0 8px 40px rgba(0,0,0,0.6); }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
  .container { width: 100%; max-width: 620px; }
  .quiz-start-card { text-align: center; padding: 48px 40px; background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); }
  .quiz-start-title { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 300; margin-bottom: 12px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .btn-gold { background: var(--gold); color: var(--bg); }
  .btn-wc { background: linear-gradient(135deg, #1d4ed8, #4f46e5); color: #fff; width: 100%; }
  .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
  .flashcard { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 56px 48px; text-align: center; cursor: pointer; }
  .wc-score-box { background: var(--bg3); padding: 16px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; margin: 20px 0; border: 1px solid rgba(255,255,255,0.08); }
  .wc-team { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .wc-score { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 600; padding: 0 20px; }
  .wc-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
  .wc-table th { color: var(--text3); padding: 8px; border-bottom: 1px solid var(--border); }
  .wc-table td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.03); }
</style>
</head>
<body>
<div class="container" id="flashcard-area"></div>
<script>
const DB_KEY = 'lexicon_words';
let fcQueue = [], fcIndex = 0, fcCorrect = 0, fcTotal = 0;
let wc = { active: false, playerTeam: null, groupTeams: [], standings: {}, stage: 'group', matchIndex: 0, opponent: null, usedWords: [] };
const NATIVE_USER_DATA = [
  {en:"accelerate", tr:"hızlandırmak"}, {en:"accumulated", tr:"birikmiş"}, {en:"across", tr:"karşısında"}, {en:"ambition", tr:"hırs"}, {en:"annoy", tr:"can sıkmak"}, {en:"applicants", tr:"başvuru sahipleri"}, {en:"apply", tr:"uygulamak"}, {en:"apprehended", tr:"yakalanmış"}, {en:"aspire", tr:"hedeflemek"}, {en:"assume", tr:"varsaymak"}, {en:"basically", tr:"temelde"}, {en:"bitterly", tr:"acı bir şekilde"}, {en:"bother", tr:"zahmet etmek"}, {en:"by the time", tr:"zamana kadar"}, {en:"candidate", tr:"aday"}, {en:"charity", tr:"yardım kuruluşu"}, {en:"chronically", tr:"kronik olarak"}, {en:"claws", tr:"pençeler"}, {en:"conflict", tr:"çatışma"}, {en:"conscience", tr:"vicdan"}, {en:"constant", tr:"sabit"}, {en:"continent", tr:"kıta"}, {en:"contribution", tr:"katkı"}, {en:"controversial", tr:"tartışmalı"}, {en:"currency", tr:"para birimi"}, {en:"dam", tr:"baraj"}, {en:"debris", tr:"enkaz"}, {en:"deceive", tr:"aldatmak"}, {en:"deception", tr:"aldatma"}, {en:"determined", tr:"kararlı"}, {en:"diadem", tr:"taç"}, {en:"district", tr:"bölge / ilçe"}, {en:"dizziness", tr:"baş dönmesi"}, {en:"doomscrolling", tr:"internette sürekli kötü haber okuma"}, {en:"dwarf", tr:"cüce"}, {en:"encounter", tr:"karşılaşmak"}, {en:"encourage", tr:"teşvik etmek"}, {en:"epidemic", tr:"salgın"}, {en:"era", tr:"dönem"}, {en:"eternity", tr:"sonsuzluk"}, {en:"excitement", tr:"heyecan"}, {en:"expensive", tr:"pahalı"}, {en:"extensive", tr:"geniş"}, {en:"fabric", tr:"kumaş"}, {en:"facility", tr:"tesis"}, {en:"fancy people", tr:"sosyetik insanlar"}, {en:"femur", tr:"uyluk kemiği"}, {en:"fewer", tr:"daha az"}, {en:"flee", tr:"kaçmak"}, {en:"forecast", tr:"tahmin"}, {en:"fraudster", tr:"dolandırıcı"}, {en:"from scratch", tr:"sıfırdan"}, {en:"gullible", tr:"kolayca kanan"}, {en:"hilarious", tr:"çok komik"}, {en:"hunted", tr:"avlanmak"}, {en:"hustler", tr:"baş belası"}, {en:"identity", tr:"kimlik"}, {en:"imply", tr:"ima etmek"}, {en:"individual", tr:"birey"}, {en:"infected", tr:"bulaşmış"}, {en:"infrastructure", tr:"altyapı"}, {en:"insist", tr:"ısrar etmek"}, {en:"inspection", tr:"inceleme"}, {en:"intense", tr:"yoğun"}, {en:"introduced", tr:"tanıtıldı"}, {en:"kindergarten", tr:"anaokulu"}, {en:"knee", tr:"diz"}, {en:"landscape", tr:"manzara"}, {en:"layout", tr:"düzen"}, {en:"led to", tr:"yol açtı"}, {en:"likely", tr:"muhtemelen"}, {en:"longevity", tr:"uzun ömür"}, {en:"luxury", tr:"lüks"}, {en:"migrate", tr:"göç etmek"}, {en:"municipality", tr:"belediye"}, {en:"naivety", tr:"saflık"}, {en:"napkin", tr:"peçete"}, {en:"nominated", tr:"aday gösterildi"}, {en:"occasionally", tr:"ara sıra"}, {en:"opposition", tr:"muhalefet"}, {en:"parental", tr:"hamilelik"}, {en:"participant", tr:"katılımcı"}, {en:"prevention", tr:"önleme"}, {en:"properly", tr:"düzgünce"}, {en:"pursue", tr:"izlemek"}, {en:"rearrange", tr:"yeniden düzenlemek"}, {en:"regulate", tr:"düzenlemek"}, {en:"relief", tr:"rahatlama"}, {en:"resilience", tr:"dayanıklılık"}, {en:"resist", tr:"direnmek"}, {en:"reunite", tr:"yeniden bir araya gelmek"}, {en:"roughly", tr:"kabaca"}, {en:"run away", tr:"kaçmak"}, {en:"scam", tr:"dolandırıcılık"}, {en:"shortage", tr:"kıtlık"}, {en:"snooze", tr:"kestirmek"}, {en:"strange", tr:"garip"}, {en:"stranger", tr:"yabancı"}, {en:"stuck in a rut", tr:"rutin hayat"}, {en:"substitute", tr:"yerine geçmek"}, {en:"sustainable", tr:"sürdürülebilir"}, {en:"torture", tr:"işkence"}, {en:"tribute", tr:"saygı duruşu"}, {en:"uncovered", tr:"ortaya çıkarılan"}, {en:"unlikely", tr:"olasılık dışı"}, {en:"unreliable", tr:"güvenilmez"}, {en:"unwittingly", tr:"farkında olmadan"}, {en:"upseting", tr:"üzücü"}, {en:"utilities", tr:"faturalar"}, {en:"variety of", tr:"çeşitlilik"}, {en:"walrus", tr:"mors"}, {en:"wear and tear", tr:"aşınma ve yıpranma"}
];

const WC_TEAMS = [
  { name: "Mexico", group: "A", stars: 2, flag: "🇲🇽" }, { name: "Switzerland", group: "B", stars: 3, flag: "🇨🇭" },
  { name: "Brazil", group: "C", stars: 3, flag: "🇧🇷" }, { name: "Türkiye", group: "D", stars: 2, flag: "🇹🇷" },
  { name: "Germany", group: "E", stars: 3, flag: "🇩🇪" }, { name: "Netherlands", group: "F", stars: 3, flag: "🇳🇱" },
  { name: "Belgium", group: "G", stars: 3, flag: "🇧🇪" }, { name: "Spain", group: "H", stars: 3, flag: "🇪🇸" },
  { name: "France", group: "I", stars: 3, flag: "🇫🇷" }, { name: "Argentina", group: "J", stars: 3, flag: "🇦🇷" },
  { name: "Portugal", group: "K", stars: 3, flag: "🇵🇹" }, { name: "England", group: "L", stars: 3, flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" }
];

function initDB() {
  if (!localStorage.getItem(DB_KEY)) {
    const data = NATIVE_USER_DATA.map((w,i) => ({ ...w, id: i, reviewCount:0, wrongCount:0, repetitions:0, isActiveMistake:false }));
    localStorage.setItem(DB_KEY, JSON.stringify(data));
  }
}

function startWCTournament() {
  wc = { active: true, stage: 'group', matchIndex: 0, usedWords: [], playerTeam: WC_TEAMS[Math.floor(Math.random()*WC_TEAMS.length)], standings: {} };
  let groupAll = WC_TEAMS.filter(t => t.group === wc.playerTeam.group);
  wc.groupTeams = [wc.playerTeam, ...groupAll.filter(t => t.name !== wc.playerTeam.name)];
  wc.groupTeams.forEach(t => wc.standings[t.name] = { P:0, W:0, D:0, L:0, GD:0 });
  renderIntro();
}

function renderIntro() {
  document.getElementById('flashcard-area').innerHTML = `
    <div class="quiz-start-card">
      <div class="quiz-start-title">WC 2026 <em>Başlıyor</em></div>
      <div class="wc-score-box" style="justify-content:center;">
        <div class="wc-team"><div class="wc-flag">${wc.playerTeam.flag}</div><div class="wc-team-name">${wc.playerTeam.name}</div></div>
      </div>
      <button class="btn btn-wc" onclick="nextMatch()">İlk Maça Çık ➔</button>
    </div>`;
}

function nextMatch() {
  wc.wordCount = wc.stage === 'group' ? 10 : (wc.stage === 'ro32' ? 15 : (wc.stage === 'ro16' ? 18 : (wc.stage === 'qf' ? 20 : 25)));
  wc.opponent = wc.stage === 'group' ? wc.groupTeams[wc.matchIndex + 1] : WC_TEAMS[Math.floor(Math.random()*WC_TEAMS.length)];
  startQuiz(wc.wordCount);
}

function startQuiz(limit) {
  let all = JSON.parse(localStorage.getItem(DB_KEY));
  // Turnuvada hiç çıkmamışları filtrele
  let pool = all.filter(w => !wc.usedWords.includes(w.id));
  if (pool.length < limit) { wc.usedWords = []; pool = all; } // Kelime biterse sıfırla
  
  // Grup aşamasında kolaydan zora (doğruluk oranı yüksekler), elemede zorlar gelsin
  let stageDiff = wc.stage === 'group' ? 0.0 : 0.5;
  pool.sort((a,b) => {
    let scoreA = (a.reviewCount - a.wrongCount) * (1 - stageDiff);
    let scoreB = (b.reviewCount - b.wrongCount) * (1 - stageDiff);
    return scoreB - scoreA;
  });

  fcQueue = pool.slice(0, limit);
  fcQueue.forEach(c => wc.usedWords.push(c.id));
  fcIndex = 0; fcCorrect = 0; fcTotal = fcQueue.length;
  showCard();
}

function showCard() {
  if (fcIndex >= fcQueue.length) { showSummary(); return; }
  let card = fcQueue[fcIndex];
  document.getElementById('flashcard-area').innerHTML = `
    <div class="flashcard" onclick="this.innerHTML+='<div style=margin-top:20px;color:var(--green)>${card.tr}</div>'; setTimeout(()=>rate(true), 1500)">
      <div class="quiz-word">${card.en}</div>
    </div>`;
}
function rate(isCorrect) { if(isCorrect) fcCorrect++; fcIndex++; showCard(); }
function showSummary() { 
  let opponentScore = Math.floor(Math.random() * (fcTotal/2)) + (fcTotal/2 - 2);
  document.getElementById('flashcard-area').innerHTML = `
    <div class="quiz-start-card">
      <div class="wc-score-box"><div class="wc-score">${fcCorrect} - ${opponentScore}</div></div>
      <button class="btn btn-wc" onclick="${wc.stage==='group' && wc.matchIndex < 2 ? 'wc.matchIndex++; nextMatch()' : 'renderPreStart()'}">Devam Et</button>
    </div>`;
}
function renderPreStart() { location.reload(); }
initDB(); renderPreStart();
</script>
</body>
</html>
